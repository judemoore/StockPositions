name: Sync Portfolio from Google Drive

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Download portfolio.html from Google Drive
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
          GDRIVE_API_KEY: ${{ secrets.GDRIVE_API_KEY }}
        run: |
          curl -L \
            "https://www.googleapis.com/drive/v3/files/${GDRIVE_FILE_ID}?alt=media&key=${GDRIVE_API_KEY}" \
            -o portfolio.html
          echo "Downloaded $(wc -c < portfolio.html) bytes"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add portfolio.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sync portfolio.html from Drive $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi
